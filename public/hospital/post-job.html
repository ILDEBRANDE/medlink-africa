<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="post_job">Post Job</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar" id="navbar"></nav>
    <div class="form-container">
        <h2 data-i18n="post_job">Post a New Job</h2>
        <form id="postJobForm">
            <div class="form-group"><label data-i18n="title">Job Title</label><input type="text" id="title" required></div>
            <div class="form-group"><label data-i18n="description">Description</label><textarea id="description" rows="5" required></textarea></div>
            <div class="form-group"><label data-i18n="specialty_required">Specialty Required</label>
                <select id="specialty_required">
                    <option value="General Practice">General Practice</option>
                    <option value="Cardiology">Cardiology</option>
                    <option value="Pediatrics">Pediatrics</option>
                    <option value="Surgery">Surgery</option>
                    <option value="Obstetrics">Obstetrics</option>
                    <option value="Radiology">Radiology</option>
                    <option value="Emergency Medicine">Emergency Medicine</option>
                </select>
            </div>
            <div class="form-group"><label data-i18n="location_type">Location Type</label>
                <select id="location_type"><option value="urban">Urban</option><option value="rural">Rural</option></select>
            </div>
            <div class="form-group"><label data-i18n="salary_range">Salary Range (optional)</label><input type="text" id="salary_range" placeholder="e.g., $50k - $70k"></div>
            <button type="submit" data-i18n="post_job">Post Job</button>
        </form>
    </div>
    <script src="/js/common.js"></script>
    <script>
        document.getElementById('postJobForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = document.getElementById('title').value;
            const description = document.getElementById('description').value;
            const specialty_required = document.getElementById('specialty_required').value;
            const location_type = document.getElementById('location_type').value;
            const salary_range = document.getElementById('salary_range').value;
            const res = await fetch('/api/jobs', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ title, description, specialty_required, location_type, salary_range })
            });
            if (res.ok) { alert('Job posted!'); window.location.href = '/hospital/jobs.html'; }
            else alert('Failed to post');
        });
        (async () => {
            await initUserPanel('hospital');
        })();
    </script>
</body>
</html>
