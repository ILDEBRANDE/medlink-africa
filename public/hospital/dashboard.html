<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="hospital_dashboard">Hospital Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar" id="navbar"></nav>
    <div class="dashboard">
        <div class="container">
            <div class="dashboard-header">
                <h2><span data-i18n="welcome">Welcome</span>, <span id="hospitalName"></span></h2>
                <p data-i18n="hospital_dashboard">Hospital Dashboard</p>
                <div id="notificationPreview" style="margin-top:10px; padding:10px; background:#f0f0f0; border-radius:5px;"></div>
            </div>
            <div class="stats-grid">
                <div class="stat-card"><h3 id="activeJobs">0</h3><p data-i18n="active_jobs">Active Jobs</p></div>
                <div class="stat-card"><h3 id="totalApplicants">0</h3><p data-i18n="total_applicants">Total Applicants</p></div>
                <div class="stat-card"><h3 id="shortlistedCount">0</h3><p data-i18n="shortlisted">Shortlisted</p></div>
            </div>
            <h3 data-i18n="recent_jobs">Recent Job Postings</h3>
            <table class="data-table" id="jobsTable">
                <thead>
                    <tr><th data-i18n="title">Title</th><th data-i18n="specialty">Specialty</th><th data-i18n="location_type">Location Type</th><th data-i18n="posted_date">Posted Date</th><th data-i18n="status">Status</th><th data-i18n="actions">Actions</th></tr>
                </thead>
                <tbody id="jobsList"></tbody>
            </table>
        </div>
    </div>
    <script src="/js/common.js"></script>
    <script src="/js/hospital-dashboard.js"></script>
    <script>
        (async () => {
            await initUserPanel('hospital');
        })();
    </script>
</body>
</html>
