<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="profile">Hospital Profile - Medical Recruitment</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .profile-container {
            max-width: 600px;
            margin: 30px auto;
            background: var(--card-bg, white);
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .profile-photo-section {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color, #ddd);
        }
        .profile-photo {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary-color, #3498db);
            margin-bottom: 10px;
        }
        .photo-upload-form {
            margin-top: 10px;
        }
        .photo-upload-form input[type="file"] {
            display: inline-block;
            width: auto;
            margin-right: 10px;
            padding: 5px;
        }
        .photo-upload-form button {
            background: var(--primary-color, #3498db);
            color: white;
            border: none;
            padding: 6px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color, #ddd);
            border-radius: 5px;
            background: var(--input-bg, white);
            color: var(--text-color, #333);
        }
        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }
        .btn-update {
            width: 100%;
            background: var(--primary-color, #3498db);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        .btn-update:hover {
            background: var(--primary-hover, #2980b9);
        }
        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
            display: none;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        @media (max-width: 768px) {
            .profile-container {
                margin: 15px;
                padding: 20px;
            }
            .profile-photo {
                width: 100px;
                height: 100px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar" id="navbar"></nav>

    <div class="profile-container">
        <h2 style="text-align: center; margin-bottom: 20px;" data-i18n="profile">Hospital Profile</h2>
        
        <!-- Profile Photo Upload Section -->
        <div class="profile-photo-section">
            <img id="profilePhotoPreview" class="profile-photo" src="/uploads/photos/default.png" alt="Profile Photo">
            <form id="photoForm" class="photo-upload-form" enctype="multipart/form-data">
                <input type="file" name="photo" accept="image/*" required>
                <button type="submit" data-i18n="upload_photo">Upload Photo</button>
            </form>
        </div>

        <!-- Profile Information Form -->
        <form id="profileForm">
            <div class="form-group">
                <label data-i18n="hospital_name">Hospital Name</label>
                <input type="text" id="hospitalName" required>
            </div>
            <div class="form-group">
                <label data-i18n="location">Location (City, Country)</label>
                <input type="text" id="location" required>
            </div>
            <div class="form-group">
                <label data-i18n="contact_phone">Contact Phone</label>
                <input type="tel" id="contactPhone">
            </div>
            <div class="form-group">
                <label data-i18n="description">Description</label>
                <textarea id="description" rows="4" placeholder="Tell us about your hospital..."></textarea>
            </div>
            <button type="submit" class="btn-update" data-i18n="update_profile">Update Profile</button>
            <div id="message" class="message"></div>
        </form>
    </div>

    <script src="/js/common.js"></script>
    <script src="/js/hospital-profile.js"></script>
    <script>
        (async () => {
            await initUserPanel('hospital');
        })();
    </script>
</body>
</html>
