<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="system_settings">System Settings</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .settings-container { max-width: 800px; margin: 30px auto; background: white; border-radius: 10px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        body.dark .settings-container { background: #16213e; }
        body.blue .settings-container { background: #1e3a5f; }
        body.green .settings-container { background: #1b4d2e; }
        .settings-group { margin-bottom: 25px; border-bottom: 1px solid #ddd; padding-bottom: 15px; }
        .setting-row { margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .setting-row label { font-weight: bold; min-width: 200px; }
        select, input { padding: 8px; border-radius: 5px; border: 1px solid #ccc; flex: 1; margin-left: 10px; background: white; }
        button { background: #3498db; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin: 5px; }
        .btn-danger { background: #e74c3c; }
        .btn-success { background: #2ecc71; }
        .message { margin: 10px 0; padding: 10px; border-radius: 5px; display: none; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; padding: 10px; border-radius: 5px; }
        .profile-photo { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; margin-bottom: 10px; }
        .photo-container { text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>
    <nav class="navbar" id="navbar"></nav>
    <div class="container">
        <div class="settings-container">
            <h2 data-i18n="system_settings">System Settings</h2>
            <div id="message" class="message"></div>

            <div class="photo-container">
                <img id="profilePhotoPreview" class="profile-photo" src="/uploads/photos/default.png" alt="Admin Photo">
                <form id="photoForm" enctype="multipart/form-data">
                    <input type="file" name="photo" accept="image/*">
                    <button type="submit" data-i18n="upload_photo">Upload Photo</button>
                </form>
            </div>

            <div class="settings-group"><h3 data-i18n="language">Language</h3>
                <div class="setting-row"><label data-i18n="choose_language">Choose language:</label><select id="languageSelect"><option value="en">English</option><option value="rw">Kinyarwanda</option><option value="fr">Français</option><option value="sw">Kiswahili</option></select></div>
            </div>

            <div class="settings-group"><h3 data-i18n="theme">Theme</h3>
                <div class="setting-row"><label data-i18n="select_theme">Select theme:</label><select id="themeSelect"><option value="light">Light</option><option value="dark">Dark</option><option value="blue">Blue</option><option value="green">Green</option></select></div>
            </div>

            <div class="settings-group"><h3 data-i18n="admin_account">Admin Account</h3>
                <div class="setting-row"><label data-i18n="email">Email:</label><input type="email" id="adminEmail"></div>
                <div class="setting-row"><label data-i18n="current_password">Current password:</label><input type="password" id="currentPassword"></div>
                <div class="setting-row"><label data-i18n="new_password">New password:</label><input type="password" id="newPassword"></div>
                <div class="setting-row"><label data-i18n="confirm_password">Confirm password:</label><input type="password" id="confirmPassword"></div>
                <button id="updateEmailBtn" data-i18n="update_email">Update Email</button>
                <button id="updatePasswordBtn" data-i18n="change_password">Change Password</button>
                <button id="deleteAccountBtn" class="btn-danger" data-i18n="delete_account">Delete Account</button>
            </div>

            <div class="settings-group"><h3 data-i18n="system_info">System Information</h3><div id="sysInfo" class="info">Loading...</div></div>
            <div class="settings-group"><h3 data-i18n="system_actions">System Actions</h3><button id="backupBtn" data-i18n="create_backup">Create Backup</button><button id="cleanupBtn" data-i18n="clean_jobs">Clean Old Jobs</button><button id="refreshInfoBtn" data-i18n="refresh">Refresh Info</button></div>
            <button id="saveSettingsBtn" class="btn-success" data-i18n="save_settings">Save Settings</button>
        </div>
    </div>
    <script src="/js/common.js"></script>
    <script>
        function showMessage(msg, type) { const d = document.getElementById('message'); d.textContent = msg; d.className = `message ${type}`; d.style.display = 'block'; setTimeout(() => d.style.display = 'none', 5000); }
        function applyTheme(theme) { document.body.className = theme; }
        
        async function loadAdminSettings() {
            const res = await fetch('/api/admin/admin-settings', { credentials: 'include' });
            if (res.ok) {
                const data = await res.json();
                document.getElementById('languageSelect').value = data.language || 'en';
                document.getElementById('themeSelect').value = data.theme || 'light';
                applyTheme(data.theme || 'light');
                if (data.profile_photo) document.getElementById('profilePhotoPreview').src = '/' + data.profile_photo;
            }
        }
        async function loadAdminEmail() { const user = await checkAuth(); if (user) document.getElementById('adminEmail').value = user.email; }
        async function loadSystemInfo() {
            const stats = await (await fetch('/api/admin/stats', { credentials: 'include' })).json();
            const health = await (await fetch('/api/admin/health-check', { credentials: 'include' })).json();
            document.getElementById('sysInfo').innerHTML = `Doctors: ${stats.doctors} | Hospitals: ${stats.hospitals} | Jobs: ${stats.jobs} | Applications: ${stats.applications}<br>Rural: ${stats.ruralJobs} | Urban: ${stats.urbanJobs}<br>Uptime: ${Math.floor(health.uptime/3600)}h ${Math.floor((health.uptime%3600)/60)}m`;
        }
        async function saveSettings() {
            const language = document.getElementById('languageSelect').value, theme = document.getElementById('themeSelect').value;
            const res = await fetch('/api/admin/admin-settings', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, credentials: 'include', body: JSON.stringify({ language, theme, timezone: 'Africa/Kigali' }) });
            if (res.ok) { applyTheme(theme); showMessage('Settings saved! Page will reload.', 'success'); setTimeout(() => location.reload(), 1000); }
            else showMessage('Failed', 'error');
        }
        async function updateEmail() { const email = document.getElementById('adminEmail').value; const res = await fetch('/api/admin/admin-email', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, credentials: 'include', body: JSON.stringify({ email }) }); if (res.ok) showMessage('Email updated', 'success'); else showMessage('Failed', 'error'); }
        async function updatePassword() { showMessage('Password change not implemented', 'error'); }
        async function deleteAccount() { if (confirm('Delete admin account?')) { await fetch('/api/admin/admin-account', { method: 'DELETE', credentials: 'include' }); window.location.href = '/'; } }
        async function createBackup() { const res = await fetch('/api/admin/backup', { method: 'POST', credentials: 'include' }); const data = await res.json(); showMessage(data.message, 'success'); }
        async function cleanupOldJobs() { if (confirm('Delete closed jobs older than 30 days?')) { const res = await fetch('/api/admin/cleanup-old-jobs', { method: 'POST', credentials: 'include' }); const data = await res.json(); showMessage(data.message, 'success'); loadSystemInfo(); } }
        
        document.getElementById('photoForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('photo', document.querySelector('#photoForm input[type="file"]').files[0]);
            const res = await fetch('/api/admin/upload-photo', { method: 'POST', body: formData, credentials: 'include' });
            if (res.ok) { alert('Photo uploaded'); location.reload(); }
            else alert('Upload failed');
        });
        
        document.getElementById('saveSettingsBtn').addEventListener('click', saveSettings);
        document.getElementById('updateEmailBtn').addEventListener('click', updateEmail);
        document.getElementById('updatePasswordBtn').addEventListener('click', updatePassword);
        document.getElementById('deleteAccountBtn').addEventListener('click', deleteAccount);
        document.getElementById('backupBtn').addEventListener('click', createBackup);
        document.getElementById('cleanupBtn').addEventListener('click', cleanupOldJobs);
        document.getElementById('refreshInfoBtn').addEventListener('click', loadSystemInfo);

        (async () => {
            await initAdminPanel();
            await loadAdminSettings();
            await loadAdminEmail();
            await loadSystemInfo();
        })();
    </script>
</body>
</html>
