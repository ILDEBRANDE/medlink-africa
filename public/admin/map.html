<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title data-i18n="hospital_map">Hospital Map</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>#map { height: 500px; margin-top: 20px; }</style>
</head>
<body>
    <nav class="navbar" id="navbar"></nav>
    <div class="container">
        <h2 data-i18n="hospital_map">Hospital Map</h2>
        <div id="map"></div>
    </div>
    <script src="/js/common.js"></script>
    <script>
        let map;
        async function initMap() {
            const res = await fetch('/api/admin/hospital-locations', { credentials: 'include' });
            const hospitals = await res.json();
            map = L.map('map').setView([-1.9403, 29.8739], 7);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap' }).addTo(map);
            hospitals.forEach(h => { L.marker([h.latitude, h.longitude]).addTo(map).bindPopup(`<b>${escapeHtml(h.hospital_name)}</b><br>${escapeHtml(h.location)}`); });
        }
        (async () => { await initAdminPanel(); await initMap(); })();
    </script>
</body>
</html>
