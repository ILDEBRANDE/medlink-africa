<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="users_management">Users Management</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        .user-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; background: #3498db; color: white; border: none; cursor: pointer; }
        .tab-btn.active { background: #2c3e50; }
        .user-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .user-table th, .user-table td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        .user-table th { background: #34495e; color: white; }
        .delete-btn, .message-btn, .map-btn { padding: 5px 10px; margin: 0 2px; border: none; cursor: pointer; border-radius: 3px; }
        .delete-btn { background: #e74c3c; color: white; }
        .message-btn { background: #2ecc71; color: white; }
        .map-btn { background: #3498db; color: white; }
        .delete-btn:hover { background: #c0392b; }
        .message-btn:hover { background: #27ae60; }
        .map-btn:hover { background: #2980b9; }
        /* Modal styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }
        .modal-content {
            background-color: var(--card-bg, white);
            margin: 5% auto;
            padding: 20px;
            width: 80%;
            max-width: 800px;
            border-radius: 10px;
            position: relative;
        }
        .close {
            position: absolute;
            right: 20px;
            top: 10px;
            font-size: 28px;
            cursor: pointer;
        }
        #map {
            height: 400px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <nav class="navbar" id="navbar"></nav>
    <div class="container">
        <h2 data-i18n="users_management">Users Management</h2>
        <div class="user-tabs">
            <button class="tab-btn active" onclick="showTab('doctors')" data-i18n="doctors">Doctors</button>
            <button class="tab-btn" onclick="showTab('hospitals')" data-i18n="hospitals">Hospitals</button>
        </div>

        <!-- Doctors Tab -->
        <div id="doctorsTab"><h3 data-i18n="doctors_list">Doctors List</h3><table class="user-table"><thead><tr><th data-i18n="name">Name</th><th data-i18n="email">Email</th><th data-i18n="specialty">Specialty</th><th data-i18n="experience">Experience</th><th data-i18n="action">Action</th></tr></thead><tbody id="doctorsList"></tbody></table></div>

        <!-- Hospitals Tab -->
        <div id="hospitalsTab" style="display:none;"><h3 data-i18n="hospitals_list">Hospitals List</h3><table class="user-table"><thead><tr><th data-i18n="name">Name</th><th data-i18n="email">Email</th><th data-i18n="location">Location</th><th data-i18n="action">Action</th></tr></thead><tbody id="hospitalsList"></tbody></table></div>
    </div>

    <!-- Map Modal -->
    <div id="mapModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3 id="modalHospitalName">Hospital Location</h3>
            <div id="map"></div>
        </div>
    </div>

    <script src="/js/common.js"></script>
    <script>
        let currentMap = null;
        let currentMarker = null;

        async function loadUsers() {
            const res = await fetch('/api/admin/users', { credentials: 'include' });
            const { doctors, hospitals } = await res.json();
            const dBody = document.getElementById('doctorsList');
            dBody.innerHTML = '';
            doctors.forEach(d => {
                dBody.insertRow().innerHTML = `
                    <td>${escapeHtml(d.full_name)}</td>
                    <td>${escapeHtml(d.email)}</td>
                    <td>${escapeHtml(d.specialty)}</td>
                    <td>${d.experience_years} yrs</td>
                    <td>
                        <button class="message-btn" onclick="messageUser(${d.id})" data-i18n="message">💬 Message</button>
                        <button class="delete-btn" onclick="deleteUser(${d.id})" data-i18n="delete">Delete</button>
                    </td>
                `;
            });
            const hBody = document.getElementById('hospitalsList');
            hBody.innerHTML = '';
            hospitals.forEach(h => {
                hBody.insertRow().innerHTML = `
                    <td>${escapeHtml(h.hospital_name)}</td>
                    <td>${escapeHtml(h.email)}</td>
                    <td>${escapeHtml(h.location)}</td>
                    <td>
                        <button class="map-btn" onclick="showHospitalMap(${h.id}, '${escapeHtml(h.hospital_name)}')" data-i18n="map">📍 Map</button>
                        <button class="message-btn" onclick="messageUser(${h.id})" data-i18n="message">💬 Message</button>
                        <button class="delete-btn" onclick="deleteUser(${h.id})" data-i18n="delete">Delete</button>
                    </td>
                `;
            });
            applyTranslations();
        }

        function messageUser(userId) {
            window.location.href = `/messages.html?userId=${userId}`;
        }

        async function deleteUser(userId) {
            if (!confirm('Delete this user?')) return;
            await fetch(`/api/admin/user/${userId}`, { method: 'DELETE', credentials: 'include' });
            loadUsers();
        }

        async function showHospitalMap(hospitalId, hospitalName) {
            const modal = document.getElementById('mapModal');
            const modalTitle = document.getElementById('modalHospitalName');
            modalTitle.innerText = hospitalName;
            modal.style.display = 'block';
            let lat = -1.9403;  // default Kigali
            let lng = 29.8739;
            try {
                const res = await fetch(`/api/admin/hospital-location/${hospitalId}`, { credentials: 'include' });
                if (res.ok) {
                    const data = await res.json();
                    if (data.latitude && data.longitude) {
                        lat = data.latitude;
                        lng = data.longitude;
                    }
                }
            } catch(e) { console.error(e); }
            setTimeout(() => {
                if (currentMap) currentMap.remove();
                currentMap = L.map('map').setView([lat, lng], 13);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
                }).addTo(currentMap);
                if (currentMarker) currentMarker.remove();
                currentMarker = L.marker([lat, lng]).addTo(currentMap);
            }, 100);
        }

        function showTab(tab) {
            document.getElementById('doctorsTab').style.display = tab === 'doctors' ? 'block' : 'none';
            document.getElementById('hospitalsTab').style.display = tab === 'hospitals' ? 'block' : 'none';
            document.querySelectorAll('.tab-btn').forEach((btn, i) => {
                btn.classList.toggle('active', (tab === 'doctors' && i === 0) || (tab === 'hospitals' && i === 1));
            });
        }

        // Modal close handlers
        document.querySelector('.close').addEventListener('click', () => {
            document.getElementById('mapModal').style.display = 'none';
        });
        window.onclick = (e) => {
            const modal = document.getElementById('mapModal');
            if (e.target === modal) modal.style.display = 'none';
        };

        (async () => {
            await initAdminPanel();
            await loadUsers();
        })();
    </script>
</body>
</html>
