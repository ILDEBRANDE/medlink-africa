<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="messages">Messages</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .chat-container { display: flex; height: 70vh; margin-top: 20px; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; }
        .conversations { width: 30%; border-right: 1px solid #ddd; overflow-y: auto; background: #f9f9f9; }
        .chat-area { width: 70%; display: flex; flex-direction: column; background: white; }
        .conversation-item { padding: 15px; cursor: pointer; border-bottom: 1px solid #eee; }
        .conversation-item:hover { background: #e9ecef; }
        .conversation-item.active { background: #007bff; color: white; }
        .messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .message { padding: 8px 12px; border-radius: 12px; max-width: 70%; word-wrap: break-word; }
        .sent { background: #007bff; color: white; align-self: flex-end; }
        .received { background: #e9ecef; color: #333; align-self: flex-start; }
        .message-input-area { display: flex; padding: 15px; border-top: 1px solid #ddd; background: white; }
        .message-input-area input { flex: 1; padding: 10px; margin-right: 10px; border: 1px solid #ccc; border-radius: 20px; }
        .message-input-area button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 20px; cursor: pointer; }
        .chat-header { padding: 15px; border-bottom: 1px solid #ddd; background: #f8f9fa; }
        .delete-msg { background: #e74c3c; color: white; border: none; border-radius: 50%; width: 20px; height: 20px; font-size: 12px; cursor: pointer; margin-left: 10px; }
        .loading, .error { text-align: center; padding: 20px; color: #888; }
    </style>
</head>
<body>
    <nav class="navbar" id="navbar"></nav>
    <div class="container">
        <h2 data-i18n="messages">Messages</h2>
        <div class="chat-container">
            <div class="conversations" id="conversationList"></div>
            <div class="chat-area">
                <div class="chat-header" id="chatHeader">Select a conversation</div>
                <div class="messages" id="messagesContainer"></div>
                <div class="message-input-area">
                    <input type="text" id="messageInput" placeholder="Type a message..." disabled>
                    <button id="sendBtn" disabled>Send</button>
                </div>
            </div>
        </div>
    </div>
    <script src="/js/common.js"></script>
    <script src="/js/chat.js"></script>
</body>
</html>
