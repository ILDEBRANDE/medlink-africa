<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="settings">Settings</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .settings-container {
            max-width: 600px;
            margin: 30px auto;
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        body.dark .settings-container { background: #16213e; }
        body.blue .settings-container { background: #1e3a5f; }
        body.green .settings-container { background: #1b4d2e; }
        .settings-group {
            margin-bottom: 25px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 15px;
        }
        .setting-row {
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .setting-row label {
            font-weight: bold;
            min-width: 200px;
        }
        select, input {
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
            flex: 1;
            margin-left: 10px;
        }
        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        .btn-danger { background: #e74c3c; }
        .btn-success { background: #2ecc71; }
        .message {
            margin: 10px 0;
            padding: 10px;
            border-radius: 5px;
            display: none;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <nav class="navbar" id="navbar"></nav>
    <div class="container">
        <div class="settings-container">
            <h2 data-i18n="settings">Settings</h2>
            <div id="message" class="message"></div>

            <!-- Language Settings -->
            <div class="settings-group">
                <h3 data-i18n="language">Language</h3>
                <div class="setting-row">
                    <label data-i18n="choose_language">select language:</label>
                    <select id="languageSelect">
                        <option value="en">English</option>
                        <option value="rw">Kinyarwanda</option>
                        <option value="fr">Français</option>
                        <option value="sw">Kiswahili</option>
                    </select>
                </div>
            </div>

            <!-- Theme Settings -->
            <div class="settings-group">
                <h3 data-i18n="theme">Theme</h3>
                <div class="setting-row">
                    <label data-i18n="select_theme">Select theme:</label>
                    <select id="themeSelect">
                        <option value="light">Light</option>
                        <option value="dark">Dark</option>
                        <option value="blue">Blue</option>
                        <option value="green">Green</option>
                    </select>
                </div>
            </div>

            <!-- Account Settings -->
            <div class="settings-group">
                <h3 data-i18n="account">Account</h3>
                <div class="setting-row">
                    <label data-i18n="email">Email:</label>
                    <input type="email" id="emailInput">
                </div>
                <div class="setting-row">
                    <label data-i18n="current_password">Current password:</label>
                    <input type="password" id="currentPassword">
                </div>
                <div class="setting-row">
                    <label data-i18n="new_password">New password:</label>
                    <input type="password" id="newPassword">
                </div>
                <div class="setting-row">
                    <label data-i18n="confirm_password">Confirm password:</label>
                    <input type="password" id="confirmPassword">
                </div>
                <button id="updateEmailBtn" data-i18n="update_email">Update Email</button>
                <button id="updatePasswordBtn" data-i18n="change_password">Change Password</button>
            </div>

            <button id="saveSettingsBtn" class="btn-success" data-i18n="save_settings">Save Settings</button>
        </div>
    </div>
    <script src="/js/common.js"></script>
    <script src="/js/settings.js"></script>
    <script>
        (async () => {
            const user = await checkAuth();
            if (!user || (user.role !== 'doctor' && user.role !== 'hospital')) {
                window.location.href = '/login.html';
                return;
            }
            injectNavbar(user.role);
            await initI18n();   // load current language
            await initTheme();   // load current theme
            // The settings.js will now load the user's email and other data
        })();
    </script>
</body>
</html>
