<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="find_jobs">Find Jobs</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }
        .modal-content {
            background-color: var(--card-bg, white);
            margin: 5% auto;
            padding: 20px;
            width: 80%;
            max-width: 800px;
            border-radius: 10px;
            position: relative;
        }
        .close, .close-applicants {
            position: absolute;
            right: 20px;
            top: 10px;
            font-size: 28px;
            cursor: pointer;
        }
        #map { height: 400px; margin-top: 10px; }
        .applicant-card {
            border: 1px solid var(--border-color, #ddd);
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
        }
        .status-applied { background: #f0ad4e; color: white; padding: 2px 6px; border-radius: 4px; }
        .status-shortlisted { background: #5bc0de; color: white; padding: 2px 6px; border-radius: 4px; }
        .status-interview-scheduled { background: #5cb85c; color: white; padding: 2px 6px; border-radius: 4px; }
        .status-hired { background: #2ecc71; color: white; padding: 2px 6px; border-radius: 4px; }
        .status-rejected { background: #d9534f; color: white; padding: 2px 6px; border-radius: 4px; }
        .application-status-box {
            margin-top: 10px;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <nav class="navbar" id="navbar"></nav>
    <div class="container">
        <h2 data-i18n="available_jobs">Available Jobs</h2>
        <div id="jobsList"></div>
    </div>

    <!-- Map Modal -->
    <div id="mapModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3 id="modalHospitalName"></h3>
            <div id="map"></div>
        </div>
    </div>

    <!-- Applicants Modal -->
    <div id="applicantsModal" class="modal">
        <div class="modal-content">
            <span class="close-applicants">&times;</span>
            <h3 id="applicantsModalTitle" data-i18n="view_all_applicants">All Applicants</h3>
            <div id="applicantsListModal"></div>
        </div>
    </div>

    <script src="/js/common.js"></script>
    <script src="/js/doctor-jobs.js"></script>
    <script>
        (async () => {
            await initUserPanel('doctor');
        })();
    </script>
</body>
</html>
