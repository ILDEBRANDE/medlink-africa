<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="profile">Doctor Profile</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .profile-photo-container {
            text-align: center;
            margin-bottom: 20px;
        }
        .profile-photo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary-color, #3498db);
        }
    </style>
</head>
<body>
    <nav class="navbar" id="navbar"></nav>
    <div class="form-container">
        <h2 data-i18n="profile">Doctor Profile</h2>
        
        <div class="profile-photo-container">
            <img id="profilePhotoPreview" class="profile-photo" src="/uploads/photos/default.png" alt="Profile Photo">
            <form id="photoForm" enctype="multipart/form-data" style="margin-top: 10px;">
                <input type="file" name="photo" accept="image/*" required>
                <button type="submit" data-i18n="upload_photo">Upload Photo</button>
            </form>
        </div>

        <form id="profileForm">
            <div class="form-group"><label data-i18n="full_name">Full Name</label><input type="text" id="fullName" required></div>
            <div class="form-group"><label data-i18n="specialty">Specialty</label>
                <select id="specialty">
                    <option>General Practice</option><option>Cardiology</option><option>Pediatrics</option>
                    <option>Surgery</option><option>Obstetrics</option><option>Radiology</option><option>Emergency Medicine</option>
                </select>
            </div>
            <div class="form-group"><label data-i18n="experience_years">Years of Experience</label><input type="number" id="experienceYears" min="0"></div>
            <div class="form-group"><label data-i18n="location_pref">Location Preference</label>
                <select id="locationPref"><option value="urban">Urban</option><option value="rural">Rural</option><option value="both">Both</option></select>
            </div>
            <div class="form-group"><label data-i18n="salary_expectation">Salary Expectation in USD ($)</label><input type="number" id="salaryExpectation"></div>
            <div class="form-group"><label data-i18n="phone">Phone Number</label><input type="tel" id="phone"></div>
            <div class="form-group"><label data-i18n="bio">additional Information</label><textarea id="bio" rows="3"></textarea></div>
            <button type="submit" data-i18n="update_profile">Update Profile</button>
        </form>

        <hr>
        <h3 data-i18n="documents">Documents</h3>
        <form id="cvForm" enctype="multipart/form-data"><div class="form-group"><label data-i18n="upload_cv">Upload CV</label><input type="file" name="cv" accept=".pdf,.doc,.docx"></div><button type="submit" data-i18n="upload">Upload CV</button></form>
        <form id="licenseForm" enctype="multipart/form-data" style="margin-top:20px"><div class="form-group"><label data-i18n="upload_license">Upload Medical License</label><input type="file" name="license" accept=".pdf,.doc,.docx"></div><button type="submit" data-i18n="upload">Upload License</button></form>
    </div>
    <script src="/js/common.js"></script>
    <script src="/js/doctor-profile.js"></script>
    <script>
        (async () => { await initUserPanel('doctor'); })();
    </script>
</body>
</html>
