<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="notifications">Notifications</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .notif-list {
            margin-top: 20px;
        }
        .notif-item {
            padding: 15px;
            border-bottom: 1px solid var(--border-color, #eee);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
        }
        .notif-item:hover {
            background: rgba(0,0,0,0.02);
        }
        .notif-item.unread {
            background: #f0f8ff;
            font-weight: bold;
        }
        body.dark .notif-item.unread {
            background: #1a3a5f;
        }
        .notif-content {
            flex: 1;
        }
        .notif-title {
            font-weight: bold;
            margin-bottom: 5px;
        }
        .notif-message {
            margin-bottom: 5px;
            color: #555;
        }
        body.dark .notif-message {
            color: #ccc;
        }
        .notif-time {
            font-size: 12px;
            color: #888;
        }
        .delete-notif {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            margin-left: 10px;
        }
        .delete-notif:hover {
            background: #c0392b;
        }
        .empty-message {
            text-align: center;
            padding: 40px;
            color: #888;
            font-style: italic;
        }
        .mark-all-read {
            background: var(--primary-color, #3498db);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 15px;
        }
        .mark-all-read:hover {
            background: var(--primary-hover, #2980b9);
        }
        @media (max-width: 768px) {
            .notif-item {
                flex-direction: column;
                align-items: flex-start;
            }
            .delete-notif {
                margin-top: 10px;
                align-self: flex-end;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar" id="navbar"></nav>
    <div class="container">
        <h2 data-i18n="notifications">Notifications</h2>
       
        <div id="notifList" class="notif-list">
            <div class="empty-message" data-i18n="loading">Loading...</div>
        </div>
    </div>
    <script src="/js/common.js"></script>
    <script src="/js/notifications.js"></script>
</body>
</html>
