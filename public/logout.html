<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logging out - Medical recruitment</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Times New Roman', Times, serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .logout-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 20px;
        }
        .logout-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            animation: fadeIn 0.5s ease;
            max-width: 400px;
            width: 100%;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .logout-card h2 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 24px;
        }
        .logout-card p {
            color: #666;
            margin-bottom: 20px;
        }
        .error-message {
            color: #e74c3c;
            background: #f8d7da;
            padding: 10px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }
        .redirect-link {
            margin-top: 20px;
        }
        .redirect-link a {
            color: #3498db;
            text-decoration: none;
        }
        .redirect-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="logout-container">
        <div class="logout-card">
            <div class="spinner"></div>
            <h2>🚪 Logging out...</h2>
            <p>Please wait, you are being redirected to login page.</p>
            <div id="errorMessage" class="error-message"></div>
            <div class="redirect-link">
                <a href="/login.html">Click here if not redirected automatically</a>
            </div>
        </div>
    </div>
    <script src="/js/logout.js"></script>
</body>
</html>
